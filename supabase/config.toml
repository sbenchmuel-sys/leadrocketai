# user JWT is sent, so the gateway must skip verification.
[functions.classify-timeline-intent-sample]
verify_jwt = false

# Phase 2a AI classifier cron. Invoked every 60 seconds by
# cron-dispatcher (target=classify-inbound). Authenticates via
# X-Internal-Secret / service-role through requireScheduledCaller;
# no user JWT is sent so the gateway must skip verification.
[functions.classify-inbound]
verify_jwt = false

# Twilio posts SMS delivery-status callbacks here. No user JWT,
# signature is verified in code via X-Twilio-Signature.
[functions.sms-status-webhook]
verify_jwt = false

# Cold outreach cadence brain (Outreach Unit C). Invoked every minute by
# cron-dispatcher (target=campaign-touch-scheduler) via X-Internal-Secret /
# service-role through requireScheduledCaller; no user JWT, so the gateway must
# skip verification.
[functions.campaign-touch-scheduler]
verify_jwt = false

# PUBLIC one-click unsubscribe for cold outreach (CAN-SPAM). Email clients open
# this UNAUTHENTICATED — verify_jwt MUST be false. Security is the signed HMAC
# token only (UNSUBSCRIBE_TOKEN_SECRET); a missing secret fails closed.
[functions.outreach-unsubscribe]
verify_jwt = false

# Rep actions on cold Outreach touches (review "Send" / manual "Sent it" / skip /
# call outcome). USER-authenticated: verify_jwt stays true and the function also
# enforces workspace membership in code (requireAuth + assertWorkspaceMembership).
[functions.outreach-touch-action]
verify_jwt = true

# gmail-bulk-sync is DUAL-MODE: cron-dispatcher (X-Internal-Secret, no Bearer) AND
# the UI "Sync now" / per-lead sync (user JWT). It gates the scheduled branch in
# code via isInternalCaller/isServiceRoleToken and authenticates the user branch
# via getUser(), so verify_jwt MUST be false — true would 401 the dispatcher's
# forward before the in-code gate runs (the cron path had been silently failing).
[functions.gmail-bulk-sync]
verify_jwt = false
