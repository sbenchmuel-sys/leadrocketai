# service-role token; no user JWT. Registration was missed in PR #38
# and added here in Phase 1.5 — see KNOWN_ISSUES.md "Edge function
# config.toml registration".
[functions.classify-timeline-intent-backfill]
verify_jwt = false

# Read-only Phase 1 spot-check helper for lead_timeline_items.intent.
