# Per-meeting transcript fetchers invoked by transcript-poller with the
# X-Internal-Secret header (no user JWT). Gateway must skip JWT verification
# or the cron-dispatched call is rejected before requirePrivilegedCaller runs.
[functions.meet-transcript-fetch]
verify_jwt = false

[functions.teams-transcript-fetch]
verify_jwt = false

# Phase 1 backfill that populates lead_timeline_items.intent from
