    <script>
      // Apply theme before paint to avoid flash. Mirrors next-themes storageKey="drivepilot-theme".
      (function () {
        try {
          var stored = localStorage.getItem('drivepilot-theme');
          var resolved;
          if (!stored) {
            resolved = 'dark'; // default for users who haven't picked
          } else if (stored === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          } else {
            resolved = stored;
          }
          document.documentElement.classList.add(resolved);
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
